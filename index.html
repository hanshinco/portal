<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>業務アプリポータル</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#6366f1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  *{box-sizing:border-box}
  :root{
    --ink:#1f2430; --muted:#6b7280; --line:#e6e8ee; --bg:#f5f6f8; --panel:#fff;
    --accent:#6366f1; --accent2:#8b5cf6; --accent-strong:#4f46e5;
  }
  html,body{margin:0}
  body{font-family:'Inter','Noto Sans JP',system-ui,sans-serif; color:var(--ink); background:var(--bg); min-height:100vh; -webkit-font-smoothing:antialiased}
  .mk{border-radius:12px; display:grid; place-items:center; background:linear-gradient(135deg,var(--accent),var(--accent2)); flex:0 0 auto}
  .mk svg{display:block; fill:#fff}

  /* ログインゲート */
  #login{min-height:100vh; display:grid; place-items:center; padding:20px}
  .login-card{background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:32px 28px; width:340px; max-width:100%; text-align:center; box-shadow:0 12px 40px rgba(31,36,48,.08)}
  .login-card .mk{width:52px; height:52px; margin:0 auto 14px}
  .login-card .mk svg{width:30px; height:30px}
  .login-title{font-weight:800; font-size:17px; margin:0 0 4px}
  .login-note{color:var(--muted); font-size:12.5px; margin:0 0 18px}
  #gbtn{display:flex; justify-content:center}
  .login-msg{margin-top:12px; font-size:12px; color:var(--muted)}
  .login-msg.ng{color:#dc2626}
  .loading{min-height:100vh; display:grid; place-items:center; color:var(--muted); font-size:13px}

  /* ランチャー */
  .wrap{max-width:960px; margin:0 auto; padding:56px 20px 72px}
  header.top{display:flex; align-items:center; gap:14px; margin-bottom:8px}
  header.top .mk{width:44px; height:44px}
  header.top .mk svg{width:26px; height:26px}
  h1{font-size:22px; font-weight:800; margin:0}
  .sub{color:var(--muted); font-size:13px; margin:4px 0 0}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; margin-top:32px}
  .card{display:flex; flex-direction:column; gap:12px; text-decoration:none; color:inherit; background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:20px; transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease}
  .card:hover{transform:translateY(-3px); box-shadow:0 12px 28px rgba(31,36,48,.10); border-color:#d6d9e2}
  .card:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .crow{display:flex; align-items:center; gap:12px}
  .ci{width:44px; height:44px; border-radius:11px; flex:0 0 auto; display:grid; place-items:center; background:#eef0fb; color:var(--accent-strong)}
  .ci svg{width:24px; height:24px; display:block}
  .cname{font-weight:700; font-size:15.5px}
  .cdesc{color:var(--muted); font-size:12.5px; line-height:1.6; flex:1}
  .cfoot{display:flex; align-items:center; justify-content:space-between; margin-top:2px}
  .tag{font-size:11px; font-weight:600; padding:3px 8px; border-radius:999px; color:var(--muted); background:#f0f1f5}
  .tag.pages{color:var(--accent-strong); background:#eef0fb}
  .go{font-size:12.5px; font-weight:600; color:var(--accent-strong); display:inline-flex; align-items:center; gap:4px}
  .go svg{width:15px; height:15px}
  .note{color:var(--muted); font-size:13px}
  footer{margin-top:40px; color:#9aa0ad; font-size:11.5px; text-align:center}
</style>
</head>
<body>

<!-- ログインゲート（組織のGoogleアカウントでログイン。中身はログイン後にGASから取得） -->
<div id="login">
  <div class="login-card">
    <span class="mk"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="7" height="7" rx="1.7"/><rect x="13" y="4" width="7" height="7" rx="1.7"/><rect x="4" y="13" width="7" height="7" rx="1.7"/><rect x="13" y="13" width="7" height="7" rx="1.7"/></svg></span>
    <p class="login-title">業務アプリ ポータル</p>
    <p class="login-note">Googleアカウントでログインしてください。</p>
    <div id="gbtn"></div>
    <div id="login-msg" class="login-msg"></div>
  </div>
</div>

<div class="loading" id="loading" style="display:none">読み込み中…</div>

<!-- 本体（ログイン後に表示） -->
<div id="app" style="display:none">
  <div class="wrap">
    <header class="top">
      <span class="mk"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="7" height="7" rx="1.7"/><rect x="13" y="4" width="7" height="7" rx="1.7"/><rect x="4" y="13" width="7" height="7" rx="1.7"/><rect x="13" y="13" width="7" height="7" rx="1.7"/></svg></span>
      <div>
        <h1>業務アプリ ポータル</h1>
        <p class="sub">利用するアプリを選んでください。</p>
      </div>
    </header>
    <main class="grid" id="grid"></main>
    <footer>hanshinco 業務アプリ ポータル</footer>
  </div>
</div>

<script src="config.js"></script>
<script src="portal.js"></script>
<script src="auth.js"></script>
</body>
</html>
